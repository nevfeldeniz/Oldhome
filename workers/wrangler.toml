name = "oldhome-publish"
main = "publish-site-data.js"
compatibility_date = "2024-06-01"

[vars]
GITHUB_OWNER = "nevfeldeniz"
GITHUB_REPO = "Oldhome"
GITHUB_BRANCH = "main"
GITHUB_FILE_PATH = "public/site-data.json"

# Oluşturmak için: npx wrangler kv namespace create SITE_DATA
# Çıkan id değerini aşağıya yapıştırın.
[[kv_namespaces]]
binding = "SITE_DATA"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"
